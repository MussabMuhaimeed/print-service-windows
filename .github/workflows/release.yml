name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          git fetch --tags --force origin 2>$null | Out-Null

          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^v') { $tag = "v$tag" }
            Write-Host "Using pushed tag $tag"
          }
          else {
            $tag = git tag -l 'v*' --sort=-v:refname | Select-Object -First 1
            if (-not $tag) {
              throw 'No v* tags found. Push a tag like v1.0.0 first.'
            }
            Write-Host "Using latest existing tag $tag"
          }

          $version = $tag.TrimStart('v', 'V')
          if ($version -notmatch '^\d+(\.\d+){1,3}$') {
            throw "Invalid version '$version' (from tag '$tag')"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $version (tag=$tag)"

      - name: Publish self-contained app
        shell: pwsh
        run: |
          dotnet publish PrintService.Windows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o ./artifacts/publish

      - name: Package release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts/package | Out-Null
          Copy-Item ./artifacts/publish/PrintService.exe ./artifacts/package/
          Copy-Item ./artifacts/publish/settings.json ./artifacts/package/
          New-Item -ItemType Directory -Force -Path ./artifacts/package/scripts | Out-Null
          Copy-Item ./scripts/*.bat ./artifacts/package/scripts/
          if (Test-Path ./artifacts/publish/Assets) {
            Copy-Item ./artifacts/publish/Assets ./artifacts/package/Assets -Recurse -Force
          }
          Compress-Archive -Path ./artifacts/package/* -DestinationPath ./artifacts/PrintService-Windows-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintService-Windows-win-x64
          path: ./artifacts/PrintService-Windows-win-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ./artifacts/PrintService-Windows-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
